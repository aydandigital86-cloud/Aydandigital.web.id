<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Sedang Dibangun</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#0f172a,#1e3a8a);
            color:#fff;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            text-align:center;
        }

        .container{
            max-width:700px;
            padding:40px;
        }

        h1{
            font-size:48px;
            margin-bottom:15px;
        }

        h2{
            color:#60a5fa;
            margin-bottom:20px;
        }

        p{
            font-size:18px;
            line-height:1.7;
            color:#d1d5db;
        }

        .loader{
            width:70px;
            height:70px;
            border:8px solid rgba(255,255,255,.2);
            border-top:8px solid #38bdf8;
            border-radius:50%;
            animation:spin 1s linear infinite;
            margin:35px auto;
        }

        @keyframes spin{
            100%{
                transform:rotate(360deg);
            }
        }

        .footer{
            margin-top:35px;
            color:#94a3b8;
            font-size:14px;
        }

        .btn{
            display:inline-block;
            margin-top:25px;
            padding:12px 28px;
            background:#38bdf8;
            color:white;
            text-decoration:none;
            border-radius:30px;
            transition:.3s;
        }

        .btn:hover{
            background:#0ea5e9;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🚧 Website Sedang Dibangun</h1>

    <h2>Coming Soon</h2>

    <div class="loader"></div>

    <p>
        Terima kasih telah berkunjung.
        Website ini masih dalam tahap pengembangan untuk memberikan pengalaman terbaik.
    </p>

    <a href="mailto:admin@domainanda.com" class="btn">
        Hubungi Kami
    </a>

    <div class="footer">
        © 2026 Daniel Sigalingging. All Rights Reserved.
    </div>

</div>

</body>
</html>
